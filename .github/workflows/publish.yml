name: Publish Python Distribution to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and Publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.9.5"
          enable-cache: false

      - name: Show uv version
        run: uv --version

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          test -n "$UV_PUBLISH_TOKEN" || (echo "ERROR: PYPI_API_TOKEN is empty or missing" && exit 1)
          UV_PUBLISH_TOKEN="$(printf %s "$UV_PUBLISH_TOKEN" | tr -d '\r\n')"
          [[ "$UV_PUBLISH_TOKEN" == pypi-* ]] || (echo "ERROR: Token does not start with 'pypi-'" && exit 1)
          uv publish --token "$UV_PUBLISH_TOKEN"