name: Publish Python 🐍 distributions 📦 to PyPI and TestPyPI

on:
  push:
    tags:
      - "v*"
      - "test-*"

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and publish Python 🐍 distributions 📦 to PyPI and TestPyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.25"
          enable-cache: true

      - name: Build distributions
        run: uv build

      - name: Publish to TestPyPI (for test tags)
        if: startsWith(github.ref, 'refs/tags/test-')
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          test -n "$UV_PUBLISH_TOKEN" || (echo "TEST_PYPI_API_TOKEN is empty or missing" && exit 1)
          uv publish \
            --username __token__ \
            --password "$UV_PUBLISH_TOKEN" \
            --publish-url https://test.pypi.org/legacy/ \
            --check-url https://test.pypi.org/simple/ \
            -v

      - name: Publish to PyPI (for versioned releases)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          test -n "$UV_PUBLISH_TOKEN" || (echo "PYPI_API_TOKEN is empty or missing" && exit 1)
          uv publish \
            --username __token__ \
            --password "$UV_PUBLISH_TOKEN" \
            --publish-url https://upload.pypi.org/legacy/ \
            --check-url https://pypi.org/simple/ \
            -v