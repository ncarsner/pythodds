name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.9.5"
          enable-cache: false

      - name: Show uv version
        run: uv --version

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest